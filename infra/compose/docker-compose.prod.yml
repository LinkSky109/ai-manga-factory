services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_manga_factory}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: Dockerfile
      target: api-runtime
    restart: unless-stopped
    env_file:
      - .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ${APP_DATA_MOUNT:-app_data}:/app/data
      - ${APP_SECRETS_MOUNT:-app_secrets}:/app/secrets
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ../..
      dockerfile: Dockerfile
      target: worker-runtime
    restart: unless-stopped
    env_file:
      - .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    volumes:
      - ${APP_DATA_MOUNT:-app_data}:/app/data
      - ${APP_SECRETS_MOUNT:-app_secrets}:/app/secrets
    command: python src/entrypoints/main.py --poll-interval 2

  web:
    build:
      context: ../..
      dockerfile: Dockerfile
      target: web-runtime
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${PUBLIC_HTTP_PORT:-8080}:8080"

  prometheus:
    image: prom/prometheus:v3.5.0
    restart: unless-stopped
    profiles: ["observability"]
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      api:
        condition: service_healthy

  grafana:
    image: grafana/grafana:12.1.1
    restart: unless-stopped
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: ${GRAFANA_ANONYMOUS_ENABLED:-false}
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_prod_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  app_data:
  app_secrets:
  postgres_prod_data:
  redis_prod_data:
  grafana_prod_data:
