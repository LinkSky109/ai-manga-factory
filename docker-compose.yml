services:
  ai-manga-factory:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-manga-factory:latest
    env_file:
      - .env
    ports:
      - "${AI_MANGA_FACTORY_PORT:-8000}:8000"
    environment:
      AI_MANGA_FACTORY_HOST: ${AI_MANGA_FACTORY_HOST:-0.0.0.0}
      AI_MANGA_FACTORY_PORT: ${AI_MANGA_FACTORY_PORT:-8000}
      AI_MANGA_FACTORY_RUNTIME_DIR: ${AI_MANGA_FACTORY_RUNTIME_DIR:-/var/lib/ai-manga-factory/runtime}
      AI_MANGA_FACTORY_RUNTIME_STORAGE_CONFIG: ${AI_MANGA_FACTORY_RUNTIME_STORAGE_CONFIG:-/app/secrets/runtime_storage_config.json}
      ARK_API_KEY: ${ARK_API_KEY:-}
      VOLC_ARK_API_KEY: ${VOLC_ARK_API_KEY:-}
      AI_MANGA_FACTORY_OSS_ACCESS_KEY_ID: ${AI_MANGA_FACTORY_OSS_ACCESS_KEY_ID:-}
      AI_MANGA_FACTORY_OSS_ACCESS_KEY_SECRET: ${AI_MANGA_FACTORY_OSS_ACCESS_KEY_SECRET:-}
    volumes:
      - ./data:/app/data
      - ./secrets:/app/secrets
      - ai-manga-factory-runtime:/var/lib/ai-manga-factory/runtime
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).getcode() == 200 else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  ai-manga-factory-runtime:
